<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumbawanga Portal</title>

    <style>
        body{
            font-family: serif;
            margin:0;
            padding:10px;
            background:#f0f0f0;
        }

        .container{
            max-width:1000px;
            margin:auto;
        }

        /* ====================================== NAVIGATION BAR ====================================== */

        .navbar{
            display:flex;
            flex-wrap:wrap;
            background:#b5c7de;
            border:1px solid #7a7a7a;
            position:sticky;
            top:0;
            z-index:1000;
        }

        .nav-item,
        .dropdown{
            flex:1 1 auto;
            position:relative;
            text-align:center;
            border-right:2px solid #b5c7de;
        }

        .navbar > *:last-child{
            border-right:none;
        }

        .nav-link{
            display:block;
            padding:10px 5px;
            text-decoration:none;
            background:#d9ead3;
            color:black;
            font-size:18px;
            cursor:pointer;
        }

        .nav-link:hover{
            background:#c2d6bc;
        }

        /* ====================================== DROPDOWN ====================================== */

        .dropdown-content{
            display:none;
            position:absolute;
            top:100%;
            left:0;
            min-width:220px;
            background:#e8f4e5;
            border:1px solid #7a7a7a;
            box-shadow:0 8px 16px rgba(0,0,0,0.2);
            z-index:999;
        }

        .dropdown-content a{
            display:block;
            padding:10px 15px;
            text-decoration:none;
            color:black;
            text-align:left;
            border-bottom:1px solid #b5c7de;
            font-size:16px;
        }

        .dropdown-content a:last-child{
            border-bottom:none;
        }

        .dropdown-content a:hover{
            background:#b5c7de;
        }

        .dropdown.open .dropdown-content{
            display:block;
        }

        @media (min-width:601px){
            .dropdown:hover .dropdown-content{
                display:block;
            }
        }

        .dropdown.force-hide .dropdown-content{
            display:none !important;
        }

        /* ====================================== MAIN BODY ====================================== */

        .main-wrapper{
            display:flex;
            margin-top:-1px;
        }

        /* ====================================== SIDEBAR ====================================== */

        .sidebar{
            width:max-content;
            white-space:nowrap;
            background:#e8f4e5;
            border:2px solid #333;
            border-right:none;
            padding:15px;
            box-sizing:border-box;
        }

        .sidebar h3{
            margin-top:0;
            font-size:18px;
            border-bottom:2px solid #b5c7de;
            padding-bottom:5px;
        }

        .sidebar a{
            display:block;
            padding:10px 5px;
            text-decoration:none;
            color:black;
            border-bottom:1px dashed #999;
            font-size:16px;
        }

        .sidebar a:hover{
            background:#d9ead3;
        }

        /* ====================================== CONTENT AREA ====================================== */

        .content-frame{
            flex:1;
            min-height:700px;
            border:2px solid #333;
            background:#cfe2f3;
            overflow:hidden;
        }

        #main_frame{
            width:100%;
            height:700px;
            border:none;
            background:white;
        }

        /* ====================================== MOBILE RESPONSIVE ====================================== */

        @media(max-width:600px){

            body{
                padding:5px;
            }

            .nav-item,
            .dropdown{
                flex:1 1 30%;
                border-bottom:2px solid #b5c7de;
                position:static;
            }

            .navbar > *:nth-child(3n){
                border-right:none;
            }

            .nav-link{
                font-size:16px;
            }

            .main-wrapper{
                flex-direction:column;
            }

            .sidebar{
                display:none;
            }

            .content-frame{
                height:600px;
            }

            #main_frame{
                height:600px;
            }

            .dropdown-content{
                position:absolute;
                top:100%;
                left:0;
                width:100%;
                box-shadow:0 8px 16px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>

</div>

<script>

/* ====================================== DROPDOWN FIX ====================================== */

document.querySelectorAll('.dropdown').forEach(drop => {

    drop.addEventListener('mouseleave', function() {

        this.classList.remove('force-hide');

    });

});

/* ====================================== TOGGLE DROPDOWN ====================================== */

function toggleDropdown(element, event) {

    if (event.target.classList.contains('nav-link')) {

        event.preventDefault();

        if (window.innerWidth <= 600) {

            document.querySelectorAll('.dropdown').forEach(drop => {

                if (drop !== element) {

                    drop.classList.remove('open');

                }

            });

            element.classList.toggle('open');

        }
    }
}

/* ====================================== LOAD PAGE ====================================== */

function loadPage(pageUrl, element){

    // ======================================
    // PAGES ZENYE LOGIN / SESSION / SECURITY
    // ======================================

    const externalPages = [

        'login.php',
        'results.php',
        'private',
        'exam_id.php',
        'missing_percentage_sheet.php',
        'missing_subjects_sheet.php',
        'control_sheet.php',
        'sheet.php',
        'score_sheet.php',

        // additional auth keywords

        'signin',
        'signup',
        'auth',
        'dashboard',
        'admin',
        'session',
        'portal'
    ];

    const shouldOpenExternally = externalPages.some(page =>
        pageUrl.toLowerCase().includes(page.toLowerCase())
    );

    // ======================================
    // OPEN EXTERNALLY IF LOGIN/SESSION PAGE
    // ======================================

    if(shouldOpenExternally){

        window.location.href = pageUrl;

    } else {

        // ======================================
        // NORMAL PUBLIC PAGES OPEN IN IFRAME
        // ======================================

        document.getElementById('main_frame').src = pageUrl;
    }

    // ======================================
    // CLOSE DROPDOWNS
    // ======================================

    document.querySelectorAll('.dropdown').forEach(drop => {

        drop.classList.remove('open');
        drop.classList.add('force-hide');

    });

    setTimeout(() => {

        document.querySelectorAll('.dropdown').forEach(drop => {

            drop.classList.remove('force-hide');

        });

    }, 1000);
}

/* ====================================== CLICK OUTSIDE CLOSE MENU ====================================== */

window.onclick = function(event) {

    if (

        !event.target.matches('.nav-link') &&
        !event.target.closest('.dropdown-content')

    ) {

        document.querySelectorAll('.dropdown').forEach(drop => {

            drop.classList.remove('open');

        });
    }
}

</script>
